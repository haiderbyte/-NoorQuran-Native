name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Create Placeholder Assets Database Directory
      run: |
        mkdir -p app/src/main/assets/databases
        touch app/src/main/assets/databases/noor_quran_database.db
        mkdir -p src/main/assets/databases
        touch src/main/assets/databases/noor_quran_database.db

    - name: Fix Corrupt Wrapper and Compile Kotlin Code
      run: |
        echo "جاري إصلاح وتحديث ملفات الـ Wrapper التالفة لنسخة 8.9..."
        
        # تحميل وتثبيت أداة Gradle أصلية ومضمونة لتوليد الـ jar السليم
        sudo apt-get update && sudo apt-get install -y unzip
        curl -sLo gradle.zip https://services.gradle.org/distributions/gradle-8.9-bin.zip
        mkdir -p /opt/gradle && unzip -q gradle.zip -d /opt/gradle
        export PATH=$PATH:/opt/gradle/gradle-8.9/bin
        
        # إعادة توليد ملف الـ jar السليم بالكامل داخل السيرفر لتخطي التلف
        gradle wrapper --gradle-version 8.9 --distribution-type all
        
        # التأكد من صلاحيات التشغيل والبدء في بناء تطبيق مصحف النور
        chmod +x gradlew
        ./gradlew :app:compileDebugKotlin --no-daemon
