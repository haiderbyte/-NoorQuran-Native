name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Create Placeholder Assets Database Directory
      run: |
        mkdir -p app/src/main/assets/databases
        touch app/src/main/assets/databases/noor_quran_database.db
        mkdir -p src/main/assets/databases
        touch src/main/assets/databases/noor_quran_database.db

    - name: Detect Gradle and Compile Kotlin Code
      run: |
        if [ -f gradlew ]; then
          echo "تم العثور على gradlew في المجلد الرئيسي"
          chmod +x gradlew
          ./gradlew :app:compileDebugKotlin --no-daemon
        elif [ -f app/gradlew ]; then
          echo "تم العثور على gradlew داخل مجلد app"
          chmod +x app/gradlew
          cd app && ./gradlew :app:compileDebugKotlin --no-daemon
        else
          echo "لم يتم العثور على ملف gradlew؛ جاري تحميل وتثبيت Gradle CLI تلقائياً..."
          sudo apt-get update && sudo apt-get install -y unzip
          curl -sLo gradle.zip https://services.gradle.org/distributions/gradle-8.6-bin.zip
          mkdir -p /opt/gradle && unzip -q gradle.zip -d /opt/gradle
          export PATH=$PATH:/opt/gradle/gradle-8.6/bin
          
          if [ -f app/build.gradle.kts ]; then
            cd app && /opt/gradle/gradle-8.6/bin/gradle :app:compileDebugKotlin --no-daemon
          else
            /opt/gradle/gradle-8.6/bin/gradle :app:compileDebugKotlin --no-daemon
          fi
        fi
