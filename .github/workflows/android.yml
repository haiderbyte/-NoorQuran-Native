name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # تحديث السيرفر رسمياً ليعمل بـ Java 21 لحل مشكلة المترجم
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'
        cache: 'gradle'

    - name: Create Placeholder Assets Database Directory
      run: |
        mkdir -p app/src/main/assets/databases
        touch app/src/main/assets/databases/noor_quran_database.db
        mkdir -p src/main/assets/databases
        touch src/main/assets/databases/noor_quran_database.db

    - name: Fix Corrupt Wrapper and Build APK
      run: |
        echo "جاري تجهيز بيئة تشغيل وتثبيت Gradle 8.9 المتوافق مع جافا 21..."
        sudo apt-get update && sudo apt-get install -y unzip
        curl -sLo gradle.zip https://services.gradle.org/distributions/gradle-8.9-bin.zip
        mkdir -p /opt/gradle && unzip -q gradle.zip -d /opt/gradle
        
        # ربط مسار bin الخاص بـ Gradle بشكل صحيح بالسيرفر
        export PATH=$PATH:/opt/gradle/gradle-8.9/bin
        
        gradle wrapper --gradle-version 8.9 --distribution-type all
        chmod +x gradlew
        
        echo "جاري بناء ملف الـ APK النهائي للتطبيق..."
        ./gradlew :app:assembleDebug --no-daemon

    # رفع ملف الـ APK لتتمكن من تحميله مباشرة فور النجاح
    - name: Upload Application APK
      uses: actions/upload-artifact@v4
      with:
        name: Moshof-AlNoor-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
